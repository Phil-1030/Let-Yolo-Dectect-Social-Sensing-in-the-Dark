<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>欢迎使用 RealFootball 系统</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(to bottom right, #e0f7fa, #ffffff);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .welcome-card {
      background-color: white;
      border-radius: 16px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.1);
      padding: 40px 30px;
      width: 100%;
      max-width: 450px;
    }
    .football-icon {
      font-size: 3rem;
      margin-bottom: 1rem;
      color: #198754;
    }
  </style>
</head>
<body>

  <div class="welcome-card text-center">
    <div class="football-icon">⚽</div>
    <h2 class="text-primary mb-3">欢迎使用 RealFootball</h2>
    <p class="lead text-muted mb-4">请选择操作进入系统</p>

    <div class="d-grid gap-3">
      <a href="/login/" class="btn btn-success btn-lg">登录</a>
      <a href="/register/" class="btn btn-outline-primary btn-lg">注册</a>
    </div>
  </div>

</body>
</html>
