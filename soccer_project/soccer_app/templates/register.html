<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>注册 - RealFootball</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(to bottom right, #e0f7fa, #ffffff);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .register-card {
      background-color: white;
      border-radius: 16px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.1);
      padding: 40px 30px;
      width: 100%;
      max-width: 480px;
    }
  </style>
</head>
<body>

  <div class="register-card">
    <h3 class="text-center text-success mb-4">注册新用户</h3>

    <form method="post" action="/register/">
      {% csrf_token %}

      <div class="mb-3">
        <label class="form-label">身份</label>
        <select name="identity" class="form-select" required>
          <option value="user" {% if request.POST.identity == 'user' %}selected{% endif %}>普通用户</option>
          <option value="manager" {% if request.POST.identity == 'manager' %}selected{% endif %}>足球经理</option>
        </select>
      </div>

      <div class="mb-3">
        <label class="form-label">用户名</label>
        <input type="text" name="username" value="{{ request.POST.username }}" class="form-control" required>
      </div>

      <div class="mb-3">
        <label class="form-label">姓名</label>
        <input type="text" name="name" value="{{ request.POST.name }}" class="form-control" required>
      </div>

      <div class="mb-3">
        <label class="form-label">年龄</label>
        <input type="number" name="age" value="{{ request.POST.age }}" class="form-control" min="1" required>
      </div>

      <div class="mb-3">
        <label class="form-label">密码</label>
        <input type="password" name="password" class="form-control" required>
      </div>

      <div class="d-grid mt-4">
        <button type="submit" class="btn btn-success btn-lg">立即注册</button>
      </div>
    </form>
  </div>

</body>
</html>
