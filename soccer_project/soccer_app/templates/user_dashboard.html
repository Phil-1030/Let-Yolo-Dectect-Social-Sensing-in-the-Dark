<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>用户功能界面 - RealFootball</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: #f9f9f9;
      min-height: 100vh;
      padding-top: 60px;
    }
    .function-card {
      background-color: white;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.1);
      padding: 40px 30px;
    }
  </style>
</head>
<body>

<div class="container">
  <div class="function-card mx-auto" style="max-width: 700px;">
    <h2 class="text-center text-primary mb-4">⚙️ 用户功能界面</h2>
    <p class="text-center text-muted mb-4">请选择你想执行的操作：</p>

    <div class="row g-3">
      <div class="col-md-6 d-grid">
        <a href="/follow_player/" class="btn btn-outline-success">添加关注的球员</a>
      </div>
      <div class="col-md-6 d-grid">
        <a href="/follow_team/" class="btn btn-outline-success">添加关注的球队</a>
      </div>
      <div class="col-md-6 d-grid">
        <a href="/view_followed_players/" class="btn btn-outline-primary">查看已关注球员</a>
      </div>
      <div class="col-md-6 d-grid">
        <a href="/view_followed_teams/" class="btn btn-outline-primary">查看已关注球队</a>
      </div>
      <div class="col-md-6 d-grid">
        <a href="/view_followed_matches/" class="btn btn-outline-info">查看已关注球队的比赛</a>
      </div>
      <div class="col-md-6 d-grid">
        <a href="/unfollow_player/" class="btn btn-outline-danger">取消关注的球员</a>
      </div>
      <div class="col-md-6 d-grid">
        <a href="/unfollow_team/" class="btn btn-outline-danger">取消关注的球队</a>
      </div>
      <div class="col-md-6 d-grid">
        <a href="/recommend_team/" class="btn btn-outline-warning">可能感兴趣的球队</a>
      </div>
      <div class="col-md-6 d-grid mx-auto">
        <a href="/guess_player/" class="btn btn-outline-dark">猜球员小游戏</a>
      </div>
      <div class="col-md-6 d-grid mx-auto mt-4">
      <a href="/logout/" class="btn btn-secondary">退出登录</a>
      </div>
    </div>
  </div>
</div>

</body>
</html>
