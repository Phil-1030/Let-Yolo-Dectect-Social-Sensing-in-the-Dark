<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>添加关注球队 - RealFootball</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light py-5">

  <div class="container">
    <div class="card shadow p-4 mx-auto" style="max-width: 600px;">
      <h3 class="text-center text-success mb-4">添加关注的球队</h3>

      <!-- 第一步：选择联赛 -->
      <form method="get" class="mb-4">
        <label class="form-label">第一步：选择联赛</label>
        <select name="league_id" class="form-select" onchange="this.form.submit()">
          <option value="">请选择</option>
          {% for league in leagues %}
            <option value="{{ league.id }}" {% if league_id == league.id|stringformat:"s" %}selected{% endif %}>
              {{ league.name }}
            </option>
          {% endfor %}
        </select>
      </form>

      <!-- 第二步：选择球队（联赛已选时） -->
      {% if teams %}
      <form method="post">
        {% csrf_token %}
        <input type="hidden" name="user_id" value="1">  <!-- TODO: 替换为当前用户 -->
        <label class="form-label">第二步：选择球队</label>
        <select name="team_api_id" class="form-select mb-3">
          {% for team in teams %}
            <option value="{{ team.team_api_id }}">{{ team.team_long_name }}</option>
          {% endfor %}
        </select>
        <div class="d-grid">
          <button type="submit" class="btn btn-primary">添加关注</button>
        </div>
      </form>
      {% endif %}
    </div>
  </div>

</body>
</html>
