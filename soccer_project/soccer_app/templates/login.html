<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>登录 - RealFootball</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(to bottom right, #f0f9ff, #ffffff);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-card {
      background-color: white;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.1);
      padding: 40px 30px;
      width: 100%;
      max-width: 420px;
    }
  </style>
</head>
<body>

  <div class="login-card text-start">
    <h3 class="text-center mb-4 text-primary">登录 RealFootball</h3>

    <form method="post" action="/login/">
      {% csrf_token %}

      <div class="mb-3">
        <label class="form-label">身份类型</label>
        <select name="identity" class="form-select" required>
          <option value="user">普通用户</option>
          <option value="manager">足球经理</option>
        </select>
      </div>

      <div class="mb-3">
        <label class="form-label">用户名</label>
        <input type="text" name="username" class="form-control" required>
      </div>

      <div class="mb-3">
        <label class="form-label">密码</label>
        <input type="password" name="password" class="form-control" required>
      </div>

      <div class="d-grid mt-4">
        <button type="submit" class="btn btn-success btn-lg">登录</button>
      </div>
    </form>
  </div>

</body>
</html>
