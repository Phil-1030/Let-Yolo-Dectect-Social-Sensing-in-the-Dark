<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>成功添加关注 - RealFootball</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            min-height: 100vh;
            padding-top: 40px;
        }
        .container {
            max-width: 600px;
        }
        .success-card {
            background-color: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            padding: 40px;
            text-align: center;
        }
        .success-icon {
            color: #28a745;
            font-size: 50px;
            margin-bottom: 20px;
        }
        .btn {
            margin: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="success-card">
            <div class="success-icon">✓</div>
            <h2 class="text-success">操作成功</h2>
            <p class="mt-3">您已成功添加对 <strong>{{ player_name }}</strong> 的关注。</p>
            <p class="text-muted">我们将为您跟踪该球员的最新动态。</p>
            
            <div class="mt-4">
                <a href="/manager_view_interested_players/" class="btn btn-primary">
                    <i class="fa fa-users me-2"></i>查看我感兴趣的球员
                </a>
                <a href="/manager_follow_player/" class="btn btn-secondary">
                    <i class="fa fa-plus me-2"></i>继续添加其他球员
                </a>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css"></script>
</body>
</html>
