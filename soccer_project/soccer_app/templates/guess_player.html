<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>猜猜球员是谁 - RealFootball</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light py-5">

  <div class="container">
    <div class="card shadow p-4 mx-auto" style="max-width: 600px;">
      <h3 class="text-center mb-4 text-primary">⚽ 猜猜这个球员是谁？</h3>

      <!-- 属性表格 -->
      <div class="table-responsive mb-4">
        <table class="table table-bordered table-sm text-center align-middle">
          <tbody>
            {% for key, value in attribute_info.items %}
            <tr>
              <th class="bg-light text-end" style="width: 40%;">{{ key }}</th>
              <td class="text-start">{{ value }}</td>
            </tr>
            {% endfor %}
          </tbody>
        </table>
      </div>

      <!-- 答题区域 -->
      <form method="post">
        {% csrf_token %}
        <div class="mb-3">
          <label class="form-label">请选择你认为的球员：</label>
          {% for option in options %}
          <div class="form-check">
            <input class="form-check-input" type="radio" name="selected" value="{{ option }}" id="option{{ forloop.counter }}" required>
            <label class="form-check-label" for="option{{ forloop.counter }}">{{ option }}</label>
          </div>
          {% endfor %}
        </div>

        <input type="hidden" name="correct" value="{{ correct }}">

        <div class="d-grid mb-3">
          <button type="submit" class="btn btn-success">提交答案</button>
        </div>
      </form>

      <!-- 回答反馈 -->
      {% if answered %}
        {% if is_correct %}
          <div class="alert alert-success text-center">✅ 回答正确！</div>
        {% else %}
          <div class="alert alert-danger text-center">❌ 回答错误，正确答案是：<strong>{{ correct }}</strong></div>
        {% endif %}
        <div class="text-center mb-3">
          <a href="/guess_player/" class="btn btn-outline-primary">下一题</a>
        </div>
      {% endif %}

      <!-- 返回按钮 -->
      <div class="text-center">
        <a href="/dashboard/" class="btn btn-outline-secondary">返回功能页面</a>
      </div>
    </div>
  </div>

</body>
</html>
