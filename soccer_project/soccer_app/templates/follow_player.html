<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>添加关注球员 - RealFootball</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light py-5">

  <div class="container">
    <div class="card shadow p-4 mx-auto" style="max-width: 600px;">
      <h3 class="text-center text-success mb-4">添加关注的球员</h3>

      <!-- 第一步：选择联赛 -->
      <form method="get" class="mb-4">
        <label class="form-label">第一步：选择联赛</label>
        <select name="league_id" class="form-select" onchange="this.form.submit()">
          <option value="">请选择</option>
          {% for league in leagues %}
            <option value="{{ league.id }}" {% if league_id == league.id|stringformat:"s" %}selected{% endif %}>
              {{ league.name }}
            </option>
          {% endfor %}
        </select>
      </form>

      <!-- 第二步：选择队伍 -->
      {% if league_id and not team_api_id %}
      <form method="get" class="mb-4">
        <input type="hidden" name="league_id" value="{{ league_id }}">
        <label class="form-label">第二步：选择队伍</label>
        <select name="team_api_id" class="form-select" onchange="this.form.submit()">
          <option value="">请选择</option>
          {% for team in teams %}
            <option value="{{ team.team_api_id }}">{{ team.team_long_name }}</option>
          {% endfor %}
        </select>
      </form>
      {% endif %}

      <!-- 球队为空提示 -->
      {% if team_api_id and players is not None and players|length == 0 %}
        <div class="alert alert-warning text-center">该球队暂无球员信息。</div>
      {% endif %}

      <!-- 第三步：选择球员 -->
      {% if players %}
      <form method="post">
        {% csrf_token %}
        <input type="hidden" name="user_id" value="1">  <!-- TODO: 替换为当前登录用户 -->
        <label class="form-label">第三步：选择球员</label>
        <select name="player_fifa_api_id" class="form-select mb-3">
          {% for player in players %}
            <option value="{{ player.player_fifa_api_id }}">{{ player.player_name }}</option>
          {% endfor %}
        </select>
        <div class="d-grid">
          <button type="submit" class="btn btn-primary">添加关注</button>
        </div>
      </form>
      {% endif %}
    </div>
  </div>

</body>
</html>
