<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>成功提示 - RealFootball</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: #f0fdf4;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .success-card {
      background-color: white;
      border-radius: 16px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.1);
      padding: 40px 30px;
      text-align: center;
      max-width: 480px;
    }
    .emoji {
      font-size: 3rem;
      margin-bottom: 1rem;
      color: #28a745;
    }
  </style>
</head>
<body>

  <div class="success-card">
    <div class="emoji">✅</div>
    <h3 class="text-success mb-3">{{ identity }}登录 / 注册成功！</h3>
    <p class="text-muted mb-4">点击下方按钮进入功能页面：</p>
    <a href="/dashboard/" class="btn btn-success btn-lg">进入用户功能界面</a>
  </div>

</body>
</html>
