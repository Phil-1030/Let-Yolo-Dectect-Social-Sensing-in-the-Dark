<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>取消关注球员 - RealFootball</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: #fefefe;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card-cancel {
      background-color: white;
      border-radius: 16px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.1);
      padding: 40px 30px;
      width: 100%;
      max-width: 480px;
    }
  </style>
</head>
<body>

  <div class="card-cancel">
    <h3 class="text-center text-danger mb-4">取消关注球员</h3>

    <form method="post" class="mb-4">
      {% csrf_token %}
      <label class="form-label">选择要取消关注的球员：</label>
      <select name="player_fifa_api_id" class="form-select mb-3" required>
        {% for player in players %}
          <option value="{{ player.player_fifa_api_id }}">{{ player.player_name }}</option>
        {% endfor %}
      </select>
      <div class="d-grid">
        <button type="submit" class="btn btn-danger btn-lg">取消关注</button>
      </div>
    </form>

    <div class="text-center">
      <a href="/dashboard/" class="btn btn-outline-secondary">返回功能页面</a>
    </div>
  </div>

</body>
</html>
