<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>经理功能界面 - RealFootball</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: #f9f9f9;
      min-height: 100vh;
      padding-top: 60px;
    }
    .function-card {
      background-color: white;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.1);
      padding: 40px 30px;
    }
  </style>
</head>
<body>

<div class="container">
  <div class="function-card mx-auto" style="max-width: 700px;">
    <h2 class="text-center text-primary mb-4">🏟️ 经理功能界面</h2>
    <p class="text-center text-muted mb-4">欢迎使用 RealFootball 经理平台，请选择功能：</p>

    <div class="row g-3">
      <!-- 球员管理 -->
      <div class="col-md-6 d-grid">
        <a href="/manager_follow_player/" class="btn btn-outline-success">➕ Add Interested Players</a>
      </div>
      <div class="col-md-6 d-grid">
        <a href="/manager_view_interested_players/" class="btn btn-outline-primary">📄 View Interested Players</a>
      </div>
      <div class="col-md-6 d-grid">
        <a href="/manager_view_all_players/" class="btn btn-outline-danger">🏢 View All Players List</a>
      </div>

      <!-- 俱乐部相关 -->
      <div class="col-md-6 d-grid">
        <a href="/manager_check_employment/" class="btn btn-outline-info">🏢 Check Employment Relationship</a>
      </div>
      <div class="col-md-6 d-grid">
        <a href="/manager_view_my_team/" class="btn btn-outline-secondary">👥 View My Team</a>
      </div>

      <!-- 智能推荐 -->
      <div class="col-md-6 d-grid mx-auto">
        <a href="/recommend_player/" class="btn btn-outline-warning">✨ Intelligent player recommendation</a>
      </div>

      <!-- 退出 -->
      <div class="col-md-6 d-grid mx-auto mt-4">
        <a href="/logout/" class="btn btn-secondary">🚪 Logout</a>
      </div>
    </div>
  </div>
</div>

</body>
</html>
